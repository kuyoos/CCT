name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x86_64
          - platform: "windows-latest"
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Go setup
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/cockpit-cliproxy/go.mod
          cache-dependency-path: sidecars/cockpit-cliproxy/go.sum

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      - name: Sync versions
        run: npm run sync-version

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          VERSION="$(node -e "console.log(require(require('path').join(process.env.GITHUB_WORKSPACE, 'package.json')).version)")"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          EXPECTED_TAG="v${{ steps.app_version.outputs.VERSION }}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Tag (${GITHUB_REF_NAME}) does not match package.json version (${EXPECTED_TAG})."
            exit 1
          fi

      - name: Build bilingual release notes from changelog
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.app_version.outputs.VERSION }}"

          extract_section() {
            local file="$1"
            local version="$2"

            awk -v version="$version" '
              BEGIN {
                capture = 0
                found = 0
              }

              /^## / {
                if (capture) {
                  exit
                }
                if ($0 ~ ("^## \\[" version "\\][[:space:]]*-.*$") || $0 ~ ("^## \\[v" version "\\][[:space:]]*-.*$")) {
                  capture = 1
                  found = 1
                }
              }

              capture {
                if ($0 ~ /^---[[:space:]]*$/) {
                  exit
                }
                print
              }

              END {
                if (!found) {
                  exit 2
                }
              }
            ' "$file"
          }

          if ! zh_section="$(extract_section CHANGELOG.zh-CN.md "$VERSION")"; then
            echo "Missing changelog section for version $VERSION in CHANGELOG.zh-CN.md"
            exit 1
          fi

          if ! en_section="$(extract_section CHANGELOG.md "$VERSION")"; then
            echo "Missing changelog section for version $VERSION in CHANGELOG.md"
            exit 1
          fi

          {
            echo "body<<EOF"
            echo "## 更新日志（中文）"
            echo
            printf '%s\n' "$zh_section"
            echo
            echo "## Changelog (English)"
            echo
            printf '%s\n' "$en_section"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: "v${{ steps.app_version.outputs.VERSION }}"
          releaseName: "Cockpit Tools v${{ steps.app_version.outputs.VERSION }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-release:
    name: Publish release as latest
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Determine version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release edit "v${VERSION}" --repo "${GITHUB_REPOSITORY}" --draft=false --prerelease=false --latest
