name: Build Matrix

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "feature/build-matrix*"
      - "feature/build-matrix/**"

concurrency:
  group: build-matrix-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      - name: Sync versions
        run: npm run sync-version

      - name: Check locales
        run: node scripts/check_locales.cjs

      - name: Typecheck
        run: npm run typecheck

  build:
    name: Build (${{ matrix.label }})
    needs: preflight
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "windows-latest"
            platform: "windows-latest"
            args: "--bundles nsis"
            installer_path: "target/release/bundle/nsis/Cockpit Tools_*_x64-setup.exe"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Go setup
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/cockpit-cliproxy/go.mod
          cache-dependency-path: sidecars/cockpit-cliproxy/go.sum

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      - name: Sync versions
        run: npm run sync-version

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          VERSION="$(node -e "console.log(require('./package.json').version)")"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Tauri binary dependencies
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\tauri
          key: tauri-deps-windows-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            tauri-deps-windows-

      - name: Build app (pull request)
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          npx tauri build --ci --config src-tauri/tauri.ci.conf.json ${{ matrix.args }} 2>&1 | tee "build-${{ matrix.label }}.log"

      - name: Print build logs on failure (PR)
        if: failure() && github.event_name == 'pull_request'
        shell: bash
        run: |
          echo "=== BUILD LOG (PR) ==="
          if [ -f "build-${{ matrix.label }}.log" ]; then
            tail -n 200 "build-${{ matrix.label }}.log"
          else
            echo "Log file not found"
          fi

      - name: Build app (signed)
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          npx tauri build --ci ${{ matrix.args }} 2>&1 | tee "build-${{ matrix.label }}.log"

      - name: Print build logs on failure (Signed)
        if: failure() && github.event_name != 'pull_request'
        shell: bash
        run: |
          echo "=== BUILD LOG (SIGNED) ==="
          if [ -f "build-${{ matrix.label }}.log" ]; then
            tail -n 200 "build-${{ matrix.label }}.log"
          else
            echo "Log file not found"
          fi

      - name: Summarize warnings
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          log_file="build-${{ matrix.label }}.log"
          warnings_file="warnings-${{ matrix.label }}.txt"
          if grep -n "^warning:" "$log_file" > "$warnings_file"; then
            warning_count="$(wc -l < "$warnings_file" | tr -d ' ')"
          else
            : > "$warnings_file"
            warning_count="0"
          fi

          {
            echo "## ${{ matrix.label }}"
            echo
            echo "- warnings: ${warning_count}"
            echo "- log: build-${{ matrix.label }}.log"
            if [ -s "$warnings_file" ]; then
              echo
              echo '```text'
              sed -n '1,200p' "$warnings_file"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.label }}
          retention-days: 7
          if-no-files-found: error
          path: |
            build-${{ matrix.label }}.log
            warnings-${{ matrix.label }}.txt

      - name: Upload Windows installer
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Cockpit Tools_${{ steps.app_version.outputs.VERSION }}_x64-setup.exe
          retention-days: 7
          if-no-files-found: error
          path: ${{ matrix.installer_path }}
